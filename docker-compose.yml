# Local DynamoDB for development and tests. No AWS account or credentials needed.
# Start with `npm run ddb:up`, then `npm run ddb:init` to create the table.
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: pulse-dynamodb-local
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    ports:
      - "8000:8000"
    working_dir: /home/dynamodblocal
